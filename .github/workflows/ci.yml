name: ShopStream CI/CD Pipeline

# Triggers on every push to main and every pull request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    # Spin up PostgreSQL and Redis as services
    # GitHub Actions runs these as Docker containers
    # Your tests connect to these — real DB, real Redis
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shopstream
          POSTGRES_PASSWORD: shopstream123
          POSTGRES_DB: productdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step 1 — checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — setup Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # caches ~/.m2 between runs — faster builds

      # Step 3 — build all modules
      - name: Build all modules
        run: mvn clean install -DskipTests

      # Step 4 — run tests (we'll add these next)
      - name: Run tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/productdb
          SPRING_DATASOURCE_USERNAME: shopstream
          SPRING_DATASOURCE_PASSWORD: shopstream123
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      # Step 5 — upload test results so you can see them in GitHub
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # upload even if tests fail
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

  # Second job — only runs if build succeeds
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build  # waits for build job to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check code style
        run: mvn checkstyle:check -f pom.xml || true

      - name: Generate test coverage report
        run: mvn jacoco:report || true