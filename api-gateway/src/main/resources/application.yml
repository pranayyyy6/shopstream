server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth — public, no filters
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        # Products — JWT + Circuit Breaker
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: productCircuitBreaker
                fallbackUri: forward:/fallback/products

        # Orders — JWT + Circuit Breaker
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/orders

        # Inventory — JWT + Circuit Breaker
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: inventoryCircuitBreaker
                fallbackUri: forward:/fallback/inventory

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"

      # Resilience4j circuit breaker config
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY

# Circuit breaker settings
resilience4j:
  circuitbreaker:
    instances:
      productCircuitBreaker:
        # Open circuit after 5 failures
        slidingWindowSize: 5
        # Wait 10s before trying again
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      orderCircuitBreaker:
        slidingWindowSize: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      inventoryCircuitBreaker:
        slidingWindowSize: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

jwt:
  secret: shopstream-super-secret-jwt-key-2024-make-it-long-enough

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"