server:
  port: 8081

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    username: shopstream
    password: shopstream123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis config
  data:
    redis:
      host: localhost
      port: 6379
      # Connection pool — reuse connections instead of creating new ones
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

    springdoc:
      api-docs:
        path: /api-docs
      swagger-ui:
        path: /swagger-ui.html
        operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: "*"