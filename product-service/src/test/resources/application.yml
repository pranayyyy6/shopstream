spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  cache:
    type: none   # disable Redis for unit tests
  config:
    import: ""   # don't fetch from config server in tests

eureka:
  client:
    enabled: false   # don't register with Eureka in tests